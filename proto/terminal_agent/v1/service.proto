syntax = "proto3";
package terminal_agent.v1;

option go_package = "github.com/QF1987/terminal-agent-go/gen/terminal_agent/v1";

import "terminal_agent/v1/device.proto";

// ============================================================
// terminal-agent gRPC 服务定义
//
// 包含两个 service：
//   1. DeviceService — 设备端调用（心跳、上报、回报）
//   2. CommandService — 服务端推送指令给设备
//
// 所有 RPC 的认证通过 metadata 传递 AuthContext 实现
// ============================================================

// ─── DeviceService ───────────────────────────────────────
// 设备端调用的服务，包含所有"设备 → 服务端"的 RPC
//
// 设备端只需要连接这一个 service 即可完成所有操作
service DeviceService {

  // 心跳
  // 设备定期（建议 30-60 秒）调用，告知服务端"我还活着"
  // 服务端更新 last_heartbeat，并通过响应告知是否有待执行指令
  //
  // 调用频率：每 30-60 秒一次
  // 超时建议：5 秒
  // 失败处理：连续失败 3 次，设备应记录本地日志并尝试重新注册
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // 状态上报
  // 设备上报完整运行状态快照，包含性能指标和当前配置
  //
  // 调用频率：每 5 分钟一次，或状态发生重大变化时立即调用
  // 重大变化：status 变更、配置修改、固件升级完成、重启完成
  // 超时建议：10 秒
  // 失败处理：记录本地日志，下次周期重试（不需要立即重试，数据有周期性补偿）
  rpc ReportStatus(StatusReport) returns (StatusReportResponse);

  // 事件上报
  // 设备端发生特定事件时实时上报（故障、交易失败、配置变更、重启等）
  //
  // 调用频率：事件驱动，不固定
  // 超时建议：10 秒
  // 失败处理：写入本地持久化队列，网络恢复后重试（事件数据不能丢）
  rpc ReportEvent(EventReport) returns (EventReportResponse);

  // 指令执行结果回报
  // 设备执行完服务端下发的指令后，通过此 RPC 回报执行结果
  //
  // 调用频率：指令执行完后调用
  // 超时建议：10 秒
  // 失败处理：写入本地持久化队列，网络恢复后重试
  // 注意：command_id 必须与收到的 Command.command_id 一致
  rpc ReportCommandResult(CommandResult) returns (CommandResultResponse);
}

// ─── CommandService ──────────────────────────────────────
// 服务端推送指令给设备的服务
//
// 设备启动后调用 CommandStream 建立长连接，服务端有指令时通过 stream 推送
// 设备端需要处理：
//   1. 连接断开后的自动重连（指数退避：1s → 2s → 4s → ... → 最大 60s）
//   2. 重连后自动接收断线期间积压的指令
//   3. 收到指令后通过 DeviceService.ReportCommandResult 回报结果
service CommandService {

  // 指令流（server streaming）
  // 设备调用后建立长连接，服务端有新指令时通过 stream 推送
  //
  // 连接生命周期：
  //   设备启动 → 连接 CommandStream → 等待指令 → 执行 → 继续等待
  //   连接断开 → 指数退避重连 → 重连成功 → 收到积压指令
  //
  // 心跳保活：
  //   gRPC 底层 HTTP/2 自带 keepalive
  //   建议设置 keepalive 参数：
  //     Time = 30s（无数据时多久发 ping）
  //     Timeout = 10s（ping 多久没响应认为断开）
  //
  // 指令顺序：
  //   服务端按 issued_at 时间顺序推送
  //   设备端收到后应立即执行，不要缓冲
  //
  // 超时建议：连接本身无超时（长连接），但设备端应设置单条指令接收超时（如 30s）
  rpc CommandStream(CommandStreamRequest) returns (stream Command);
}

// ─── 响应消息 ────────────────────────────────────────────

// 指令执行结果的响应
message CommandResultResponse {
  // 服务端是否接受此次回报
  bool   accepted = 1;

  // 结果描述
  // 成功时："ok"
  // 失败时：原因，如 "command_id 不存在"、"指令已超时"
  string message = 2;
}
